# Netlify Configuration for SpaceBorne Car Hire
# This configuration deploys both frontend and backend as a unified application

[build.environment]
  # Node version for build and runtime
  NODE_VERSION = "20"
  # Force npm to install ALL dependencies (including devDependencies) during build
  NPM_CONFIG_PRODUCTION = "false"

[build]
  SECRETS_SCAN_OMIT_PATHS = "**/*.md,.cursor/**,backend/diagnose-mpesa.js,backend/test-credentials.js,backend/test-mpesa.js,car-hire-main123/**,.env.netlify.template,package.json,netlify.toml"
  # Build command for the frontend (Vite)
  command = "npm run build"
  # Directory containing the built frontend files
  publish = "dist"
  # Functions directory for serverless backend
  functions = "netlify/functions"

# Redirect all API requests to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Redirect image requests to the serverless function
[[redirects]]
  from = "/images/*"
  to = "/.netlify/functions/api/images/:splat"
  status = 200
  force = true

# Redirect static uploads to the serverless function
[[redirects]]
  from = "/uploads/*"
  to = "/.netlify/functions/api/uploads/:splat"
  status = 200
  force = true

# SPA fallback - all other routes go to index.html (for React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for enhanced security and CORS
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, Accept, x-auth-token"
    Access-Control-Expose-Headers = "Authorization"

[[headers]]
  for = "/images/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cross-Origin-Resource-Policy = "cross-origin"
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"

# Environment context-specific settings (set secrets in Netlify dashboard only)
[context.deploy-preview.environment]
  NODE_ENV = "development"

[context.branch-deploy.environment]
  NODE_ENV = "development"

# Functions configuration
[functions]
  node_bundler = "esbuild"
  included_files = ["backend/**"]
  # Mongoose has native bindings — keep external so Netlify bundles correctly
  external_node_modules = ["mongoose"]

[functions."api"]
  # STK push + token calls can be slow; Netlify max is 26s
  timeout = 26
