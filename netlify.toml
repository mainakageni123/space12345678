# Netlify Configuration for SpaceBorne Car Hire
# This configuration deploys both frontend and backend as a unified application

[build.environment]
  # Node version for build and runtime
  NODE_VERSION = "20"
  # Force npm to install ALL dependencies (including devDependencies) during build
  NPM_CONFIG_PRODUCTION = "false"
  # Ignore harmless variables from Netlify Secrets Scanning to prevent false positives
  SECRETS_SCAN_OMIT_KEYS = "NODE_ENV,PORT,DB_NAME,KCB_BUNI_ENV,KCB_BUNI_ORG_SHORTCODE,KCB_BUNI_ACCOUNT_NUMBER,KCB_BUNI_TOKEN_URL,KCB_BUNI_CALLBACK_URL"
  # Omit documentation, configuration, and template files from Netlify Secrets Scanning
  SECRETS_SCAN_OMIT_PATHS = "**/*.md,**/*.template,**/*.example,.cursor/**,**/diagnose-mpesa.js,**/test-credentials.js,**/test-mpesa.js,**/package.json,netlify.toml,car-hire-main123/**"

[build]
  # Build command for the frontend (Vite)
  command = "npm run build"
  # Directory containing the built frontend files
  publish = "dist"
  # Functions directory for serverless backend
  functions = "netlify/functions"

# Redirect all API requests to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Redirect image requests to the serverless function
[[redirects]]
  from = "/images/*"
  to = "/.netlify/functions/api/images/:splat"
  status = 200
  force = true

# Redirect static uploads to the serverless function
[[redirects]]
  from = "/uploads/*"
  to = "/.netlify/functions/api/uploads/:splat"
  status = 200
  force = true

# SPA fallback - all other routes go to index.html (for React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for enhanced security and CORS
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, Accept, x-auth-token"
    Access-Control-Expose-Headers = "Authorization"

[[headers]]
  for = "/images/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cross-Origin-Resource-Policy = "cross-origin"
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*"
  [headers.values]
    # Clickjacking prevention
    X-Frame-Options = "DENY"
    # MIME sniffing prevention
    X-Content-Type-Options = "nosniff"
    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Force HTTPS for 1 year; include subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Restrict access to sensitive browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    # Content Security Policy — tightened for Kenya DPA compliance
    # self           : HTML, CSS, JS from same origin
    # fonts.gstatic / fonts.googleapis : Google Fonts
    # *.netlify.app  : Netlify Function API calls (same origin in prod — kept for previews)
    # unsafe-inline  : needed for inline styles used by React/Vite; remove if using nonces
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.netlify.app https://*.mongodb.net https://api.safaricom.co.ke https://uat.buni.kcbgroup.com https://api.buni.kcbgroup.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

# Environment context-specific settings (set secrets in Netlify dashboard only)
[context.deploy-preview.environment]
  NODE_ENV = "development"

[context.branch-deploy.environment]
  NODE_ENV = "development"

# Functions configuration
[functions]
  node_bundler = "esbuild"
  included_files = ["backend/**"]
  # Mongoose has native bindings — keep external so Netlify bundles correctly
  external_node_modules = ["mongoose"]

[functions."api"]
  # STK push + token calls can be slow; Netlify max is 26s
  timeout = 26
